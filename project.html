<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Project</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 25px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .btn {
            padding: 12px 25px;
            background: #00c6ff;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .status {
            margin-top: 20px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 CI/CD Pipeline</h1>
        <p>Jenkins + GitHub Integrated Deployment</p>

        <button class="btn" onclick="showMessage()">Check Status</button>

        <div class="status" id="status"></div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("status").innerText = "✅ Deployment Successful!";
        }
    </script>

</body>
</html>
