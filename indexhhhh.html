<!DOCTYPE html>
<html>
<head>
    <title>Cloud Computing Project</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
        }

        footer {
            background: #020617;
            text-align: center;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>☁️ Cloud Computing System</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section>
    <h2>Welcome to Cloud Project</h2>
    <p>This project demonstrates CI/CD using Jenkins.</p>

    <div class="card">
        <h3>Storage</h3>
        <p>Secure cloud storage</p>
    </div>

    <div class="card">
        <h3>Compute</h3>
        <p>High performance servers</p>
    </div>

    <div class="card">
        <h3>Security</h3>
        <p>Data protection services</p>
    </div>

    <br><br>
    <button onclick="showMessage()">Click Me</button>
    <p id="msg"></p>
</section>

<footer>
    <p>© 2026 Cloud Project | CI/CD Demo</p>
</footer>

<script>
function showMessage() {
    document.getElementById("msg").innerHTML = "🚀 Deployed using Jenkins CI/CD!";
}
</script>

</body>
</html>
